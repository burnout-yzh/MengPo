# =============================================================================
#  bowl.yaml  —  孟婆汤碗
# =============================================================================
#
#  天地之道，乾以易知，坤以简能。
#  乾主变易 — 记忆如何演化、衰减、重排。
#  坤主承载 — 引擎跑在哪里、读什么、写到哪。
#
#  一行不发，万行不随。三碗不过岗。先配泡面碗，再熬孟婆汤。
#
# =============================================================================
#  乾  —  记忆算法参数
# =============================================================================

# ═══════════════════════════════════════════════════════════════════════════
#  嵌入  —  把文字变成高维几何点。换模型时必须同步改 dim。
# ═══════════════════════════════════════════════════════════════════════════

embedding:

  # 嵌入模型名。Ollama 拉取的名字。
  # 建议：qwen3-embedding（轻量 1024d）、bge-m3（多语言 1024d）
  model: qwen3-embedding-0.6b

  # 向量维度。必须与模型输出对齐，否则 vec0 拒绝写入。
  dim: 1024


# ═══════════════════════════════════════════════════════════════════════════
#  忘忧衰减  —  WangYou_Decay  ·  新鲜度 e^(-Δt / τ)
# ═══════════════════════════════════════════════════════════════════════════

decay:

  # 拉面努金 τ — 记忆半衰期（天）。
  #   一个记忆的新鲜度降到初始一半所需的时间。
  #   值越大 → 旧记忆保留越久，检索偏保守。
  #   值越小 → 追新忘旧，检索偏激进。
  #   建议：7-14天，取决于每个人自己的遗忘节奏。
  #   建议从 10.71 试用一段时间后按需修改，此值不建议轻易修改
  tau: 10.71                     # 24 / √5 — 黄金特征推导值

  # 新鲜度起点 — 刚写入（或刚被 S3 强化后）的记忆新鲜度满分。
  #   默认 1.0。减小会让所有记忆一开始就显得"旧"。
  #   建议：0.5 ~ 1.0。
  initial_strength: 1.0

  # 新鲜度下限 — 再旧的记忆也不会降到这个值以下。
  #   防止太久远的记忆被完全放弃。同时避免数学计算出现极端值。
  #   建议：0.001 ~ 0.1。
  floor: 0.01


# ═══════════════════════════════════════════════════════════════════════════
#  检索  —  Naihe_Bridge(奈何桥) + Samsara_Rank(轮回排序)
# ═══════════════════════════════════════════════════════════════════════════

retrieval:

  # S1 语义候选上限 — 从向量库拉取的候选数，全部参与 blend 排序后缓存。
  #   池子越大召回越全，但嵌入+排序成本也越高。
  #   建议：15 ~ 90。45 条支持 8 次 expand（每轮 5 条）。
  candidate_limit: 45

  # S2 递送条数 — 每次返回给 LLM 的记忆条数。
  #   5 条是经验甜点：信息量够，不撑爆上下文。一次搞定。
  #   建议：3 ~ 10。
  result_limit: 5

  # 新鲜度权重 — Samsara_Rank 加权几何平均中的新鲜度占比。
  #   0 = 纯语义，1 = 纯新鲜度。
  #   建议：0.2 ~ 0.5。0.368 是 1/e，自然衰减常数。
  freshness_weight: 0.368        # 1/e


# ═══════════════════════════════════════════════════════════════════════════
#  三生石写回  —  Sansheng_Stone  ·  S3 强化锚点
# ═══════════════════════════════════════════════════════════════════════════

sansheng_stone:

  # 时间锚点收缩比 — 被 LLM 标记为"有用"的记忆，其"上次有效回召时间"
  #   被拉向现在的比例。shrink_factor=0.368 意味着：
  #      reinforced_at = now - (now - previous_effective_at) × 0.368
  #   即：锚点被拉近了 63.2%（1 - 1/e）。
  #   指数效应：每次 S3 写回都会叠加收缩。
  #   建议：0.25 ~ 0.5。越大越激进（一次就拉得很近）。由于指数效应，两次有效命中即可
  #     大幅度增加记忆新鲜度。
  shrink_factor: 0.368           # 1/e


# ═══════════════════════════════════════════════════════════════════════════
#  去重  —  高相似度裁决
# ═══════════════════════════════════════════════════════════════════════════

dedup:

  # 向量相似度阈值 — 超过此值的候选进入 LLM 裁决流程。
  #   0.95 = 只有几乎完全一样的文本才触发。
  #   降低（如 0.85）会更激进地拦相似内容，但也增加去重判断的token需求。
  #   建议：0.85 ~ 0.98。
  threshold: 0.95


# ═══════════════════════════════════════════════════════════════════════════
#  分段  —  Markdown → chunk
# ═══════════════════════════════════════════════════════════════════════════

chunk:

  # ── 分段策略 ──
  #   先按空行 (\\n\\n) 拆分段落。短段落累积到 min 再输出，避免碎臊子。
  #   硬边界（分隔线、代码块）强制刷新。长段落按 max 在句子边界切断。

  # 最小 chunk 尺寸。太短的段落累积合并，直到达到此值。
  #   建议：100 ~ 200。160 在中文日记/文档中效果稳定。
  size_min: 160

  # 最大 chunk 尺寸。超过此值的段落在。！？等句边界附近切断。
  #   建议：400 ~ 600。500 适合中等长度中文段落。
  size_max: 500



# =============================================================================
#  坤  —  运维参数
# =============================================================================

# ═══════════════════════════════════════════════════════════════════════════
#  服务  —  Ollama 与 MCP server 的地基
# ═══════════════════════════════════════════════════════════════════════════

server:

  # Ollama 嵌入服务地址。通常为本机。
  ollama_base_url: http://127.0.0.1:11434

  # MCP server 监听端口。改它前需要确认端口可用。
  mcp_port: 18081

  # MCP server 在客户端显示的名字。
  mcp_name: MengPo Memory Server

  # 重排序模型 — 可选精排。S1语义 + S2忘忧混合已足够日常检索。
  #   需要时可在此填入 cross-encoder 模型名（如 bge-reranker-v2-m3）
  #   或 llama.cpp ，api端点，配置重排模型，获得更高S2排序精度。
  rerank_model: qwen3-reranker-0.6b


# ═══════════════════════════════════════════════════════════════════════════
#  存储  —  数据库与日志
# ═══════════════════════════════════════════════════════════════════════════

storage:

  # SQLite 数据库文件路径。
  db_path: ./mengpo_memory.db

  # MCP 访问日志。
  log_path: ./mcp_access.log


# ═══════════════════════════════════════════════════════════════════════════
#  注入  —  inject_memory.py 的扫描与输入源
# ═══════════════════════════════════════════════════════════════════════════

injection:

  # markdown 记忆文件的根目录。递归扫描所有 *.md。
  #   建议：指向 Obsidian vault 或日记文件夹的绝对路径。
  #   或者新建 ./memory/ 文件夹并向其中放置.md文件
  memory_dir: ./memory

  # 扫描文件 glob 模式。
  #   默认 "*.md"。可改为 "*.txt" 等，但其他格式未经过验证，
  #   chunker 的行为可能不完全适配非 Markdown 文本。
  #   修改前请确认你的数据格式与 chunker 兼容。
  file_pattern: "*.md"

  # 批量嵌入大小。一次 Ollama /api/embed 调用嵌入的 chunk 数。
  #   大 batch = 更快（减少 HTTP 往返），但单次调用更重。
  #   建议：5 ~ 20。15 在 qwen3-embedding-0.6b 上实测 ~0.3s/batch。
  batch_size: 15


# ═══════════════════════════════════════════════════════════════════════════
#  安全锁  —  rebuild 时的安全门限
# ═══════════════════════════════════════════════════════════════════════════

rebuild:

  # 扫描文件数预警 / 硬上限。达到 warn 打日志，达到 hard 拒绝执行。
  # 调整到 -1 则为无限制，但是无法保证性能。当前性能水平：warn , 约 1.3s，hard,约
  #   2s。未测试，当前仅为理论计算值。实际可能受多因素影响，
  #   建议个人使用默认即可；团队知识库可调高。
  warn_max_files: 250000      #chunks
  hard_max_files: 500000      #chunks

  # 扫描文件大小预警 / 硬上限（字节）。
  warn_max_bytes: 26843545600      # 25 GiB
  hard_max_bytes: 53687091200      # 50 GiB
